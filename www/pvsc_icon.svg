<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- EM2GO Home PV-Überschussladen - Icon: die Wallbox in Frontansicht
       (wie das Original: dunkles Gehäuse, türkiser LED-Ring, Display,
       Pfeil/OK-Tasten, Stop-Knopf), dazu Sonne + Blitz für den PV-Bezug -->
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#414b55"/>
      <stop offset="0.5" stop-color="#333d46"/>
      <stop offset="1" stop-color="#232930"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd54f"/>
      <stop offset="1" stop-color="#ff9800"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ccc65"/>
      <stop offset="1" stop-color="#43a047"/>
    </linearGradient>
  </defs>

  <!-- Wallbox-Gehäuse: dominant, mittig, Frontansicht -->
  <g>
    <rect x="24" y="6" width="62" height="84" rx="11" fill="url(#body)"/>
    <rect x="24" y="6" width="62" height="84" rx="11" fill="none" stroke="#4d5d6b" stroke-width="2"/>
    <!-- Gehäusefugen wie beim Original -->
    <line x1="26" y1="26" x2="84" y2="26" stroke="#1a2025" stroke-width="1.5"/>
    <line x1="26" y1="58" x2="84" y2="58" stroke="#1a2025" stroke-width="1" opacity="0.6"/>
    <!-- "Logo"-Fläche + RFID-Feld oben links -->
    <rect x="29" y="12" width="16" height="4" rx="2" fill="#8fa3b0" opacity="0.9"/>
    <rect x="29" y="20" width="10" height="3.4" rx="1.2" fill="none" stroke="#8fa3b0" stroke-width="1"/>
    <!-- Stop-Knopf rechts -->
    <rect x="78.5" y="17" width="6" height="6" rx="1.6" fill="#e53935"/>
    <!-- Status-LED -->
    <circle cx="72" cy="14" r="1.6" fill="#cfd8dc"/>

    <!-- Türkiser LED-Ring (Kapsel, mittig wie beim Original) -->
    <rect x="42" y="12" width="30" height="72" rx="15"
          fill="none" stroke="#26c6da" stroke-width="1.4" opacity="0.4"/>
    <rect x="43.8" y="13.8" width="26.4" height="68.4" rx="13.2"
          fill="none" stroke="#5ce6ee" stroke-width="2.6" stroke-linecap="round"/>

    <!-- Display in der Ringmitte -->
    <rect x="47.5" y="28" width="19" height="30" rx="2" fill="#10151a" stroke="#3c4a55" stroke-width="1"/>
    <rect x="50" y="31"   width="11" height="2.8" rx="1.4" fill="#eceff1"/>
    <rect x="50" y="36.5" width="14" height="2.4" rx="1.2" fill="#66bb6a"/>
    <rect x="50" y="41"   width="9"  height="2.4" rx="1.2" fill="#ffb300"/>
    <!-- grüne Verlaufskurve unten im Display -->
    <path d="M50 55 L50 51.5 Q54 47.5 57 50.5 Q61 53.5 64 49.5 L64 55 Z" fill="#4caf50"/>

    <!-- Tasten: hoch / OK / runter -->
    <g>
      <rect x="45.5" y="65" width="7" height="7" rx="1.8" fill="#eceff1"/>
      <path d="M49 66.8 L51.2 70.4 L46.8 70.4 Z" fill="#263238"/>
      <rect x="53.5" y="65" width="7" height="7" rx="1.8" fill="#eceff1"/>
      <rect x="55" y="67.6" width="4" height="1.8" rx="0.9" fill="#263238"/>
      <rect x="61.5" y="65" width="7" height="7" rx="1.8" fill="#eceff1"/>
      <path d="M65 70.6 L62.8 67 L67.2 67 Z" fill="#263238"/>
    </g>
  </g>

  <!-- Sonne: oben links, überlappt das Gehäuse leicht -->
  <g>
    <circle cx="16" cy="16" r="9" fill="url(#sun)"/>
    <g stroke="#ffb300" stroke-width="2.6" stroke-linecap="round">
      <line x1="16" y1="1.5" x2="16" y2="4.8"/>
      <line x1="16" y1="27.2" x2="16" y2="30.5"/>
      <line x1="1.5" y1="16" x2="4.8" y2="16"/>
      <line x1="27.2" y1="16" x2="30.5" y2="16"/>
      <line x1="5.7" y1="5.7" x2="8.1" y2="8.1"/>
      <line x1="23.9" y1="23.9" x2="26.3" y2="26.3"/>
      <line x1="26.3" y1="5.7" x2="23.9" y2="8.1"/>
      <line x1="8.1" y1="23.9" x2="5.7" y2="26.3"/>
    </g>
  </g>

  <!-- Blitz: unten links, überlappt das Gehäuse -->
  <path d="M14 44 L28 44 L21 55 L31 55 L12 82 L18 61 L9 61 Z"
        fill="url(#bolt)" stroke="#2e7d32" stroke-width="1.4" stroke-linejoin="round"/>
</svg>
